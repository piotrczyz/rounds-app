name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  backend:
    name: Backend (lint, build, test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rounds
          POSTGRES_PASSWORD: rounds
          POSTGRES_DB: rounds
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rounds -d rounds"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://rounds:rounds@localhost:5432/rounds?schema=public

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm -C backend prisma:generate

      - name: Lint
        run: pnpm -C backend lint

      - name: Build
        run: pnpm -C backend build

      - name: Test
        run: pnpm -C backend test
